<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth With India - Registration</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .registration-card {
            background-color: #131926;
            border: 1px solid #242f47;
            border-radius: 8px;
            padding: 30px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 {
            color: #d4af37; /* Gold color like your screenshot */
            margin-bottom: 25px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            padding: 12px;
            background-color: #0d121d;
            border: 1px solid #1f2a3f;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input::placeholder {
            color: #566785;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #d4af37;
            border: none;
            border-radius: 4px;
            color: #0b0f19;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background-color: #bfa030;
        }
    </style>
</head>
<body>

<div class="registration-card">
    <h2>GWI Registration</h2>
    
    <form id="regForm">
        <div class="input-group">
            <input type="text" id="sponsorId" placeholder="Sponsor ID Dalein (Optional)">
        </div>
        <div class="input-group">
            <input type="text" id="fullName" placeholder="Kuldeep singh" required>
        </div>
        <div class="input-group">
            <input type="tel" id="mobileNumber" placeholder="8233781854" required>
        </div>
        
        <button type="submit" class="btn-submit">SUBMIT</button>
    </form>
</div>

<script>
    document.getElementById('regForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // यहाँ आप अपना डेटा संभाल सकते हैं
        const name = document.getElementById('fullName').value;
        const mobile = document.getElementById('mobileNumber').value;
        const sponsor = document.getElementById('sponsorId').value;

        // नोट: यदि आप Firebase इस्तेमाल कर रहे हैं, तो नीचे अपनी सही API Key डालें
        alert("रजिस्ट्रेशन डेटा सबमिट किया जा रहा है: " + name);
        
        /* 
        अगर आपको Google/Firebase से जोड़ना है तो यहाँ सही API Key वाला कोड आएगा:
        
        const firebaseConfig = {
            apiKey: "यहाँ_अपनी_सही_API_KEY_डालें",
            authDomain: "your-app.firebaseapp.com"
        };
        */
    });
</script>

</body>
</html>
